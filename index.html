      rel="stylesheet"
    />
    <script>
      ;(function () {
        try {
          var theme = localStorage.getItem('scrappy-theme')
          var resolved = theme
          if (theme === 'system' || !theme) {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          }
          if (resolved === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
